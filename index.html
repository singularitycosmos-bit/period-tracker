<!DOCTYPE html>
<html>
<head>
  <title>Cycle Tracker</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .app {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #4a6cf7;
      color: white;
      font-size: 16px;
    }

    .card {
      background: #f1f3f8;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .small {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="app">

  <h2 style="text-align:center;">Cycle Tracker</h2>

  <input type="date" id="date">

  <input type="range" min="1" max="10" id="pain">
  <p>Pain Level: <span id="painVal">5</span></p>

  <textarea id="notes" placeholder="Notes"></textarea>

  <button onclick="saveData()">Save</button>

  <h3 id="result"></h3>

  <h3>History</h3>
  <div id="history"></div>

</div>

<script>
let SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwx7Eh3PW3XvXtrinC6pdn6dgftezov_FQHk-v2b6nv-u0b-W62D4ZE93BiMhfKSrM0qA/exec";

// slider
let pain = document.getElementById("pain");
pain.oninput = () => {
  document.getElementById("painVal").innerText = pain.value;
};

// SAVE TO GOOGLE SHEETS
function saveData() {
  let date = document.getElementById("date").value;
  let pain = document.getElementById("pain").value;
  let notes = document.getElementById("notes").value;

  if(!date){
    alert("Please select a date");
    return;
  }

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ date, pain, notes })
  })
  .then(() => {
    alert("Saved to Google Sheets ✅");
    showLocal();
  })
  .catch(() => {
    alert("Error saving data");
  });

  let next = new Date(date);
  next.setDate(next.getDate() + 28);

  document.getElementById("result").innerText =
    "Next period: " + next.toDateString();
}

// LOCAL DISPLAY ONLY
function showLocal() {
  let data = JSON.parse(localStorage.getItem("cycleData")) || [];

  let entry = {
    date: document.getElementById("date").value,
    pain: document.getElementById("pain").value,
    notes: document.getElementById("notes").value
  };

  data.push(entry);
  localStorage.setItem("cycleData", JSON.stringify(data));

  let history = document.getElementById("history");
  history.innerHTML = "";

  for(let i = data.length - 1; i >= 0; i--){
    history.innerHTML += `
      <div class="card">
        <b>${data[i].date}</b><br>
        Pain: ${data[i].pain}<br>
        ${data[i].notes || ""}
      </div>
    `;
  }
}

window.onload = showLocal;
</script>

</body>
</html>
